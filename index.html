<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة حبيب قدوس</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --deep-red: #8b0000;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        /* صورة السيد المسيح */
        .jesus-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid var(--primary-gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-top: 20px;
        }
        /* الصليب */
        .cross {
            font-size: 80px;
            color: var(--deep-red);
            display: block;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        h1 { color: #2c3e50; margin: 10px 0; font-size: 2.5em; }
        h2 { color: var(--primary-gold); font-weight: normal; }
        
        /* مربع البحث المتفاعل */
        .search-box {
            position: relative;
            max-width: 500px;
            margin: 30px auto;
        }
        #searchInput {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid var(--primary-gold);
            border-radius: 30px;
            font-size: 18px;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        #searchInput:focus {
            box-shadow: 0 6px 12px rgba(212, 175, 55, 0.3);
            border-color: var(--deep-red);
        }

        /* قائمة النتائج */
        #results {
            list-style: none;
            padding: 0;
            max-width: 600px;
            margin: 20px auto;
        }
        .file-item {
            background: white;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .file-item:hover { transform: scale(1.02); }
        .file-item a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
        }
        .loading { color: var(--deep-red); font-style: italic; }
    </style>
</head>
<body>

    <span class="cross">†</span>
    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=JesusArt" alt="سيد المسيح" class="jesus-img">
    
    <h1>الكتاب المقدس كامل</h1>
    <h2>مكتبة حبيب قدوس</h2>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="اكتب اسم الملف أو كلمة من الداخل..." oninput="searchFiles()">
    </div>

    <div id="status" class="loading">جاري تجهيز الملفات...</div>
    <ul id="results"></ul>

    <script>

        const repo = 'habib-quddous.github.io';

        async function init() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                const data = await response.json();
                // تصفية الملفات (نستبعد index.html)
                allFiles = data.filter(f => f.type === 'file' && f.name !== 'index.html');
                document.getElementById('status').innerText = `تم تحميل ${allFiles.length} ملف جاهز للبحث`;
            } catch (e) {
                document.getElementById('status').innerText = "خطأ في الاتصال بالمستودع";
            }
        }
