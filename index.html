<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة حبيب قدوس</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 50px;
        }
        .header-icon {
            font-size: 50px;
            color: #8b0000;
        }
        h1 {
            color: #333;
        }
        .search-container {
            margin-top: 30px;
        }
        input[type="text"] {
            padding: 10px;
            width: 60%;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: #8b0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .welcome-msg {
            margin-top: 20px;
            font-size: 20px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="header-icon">†</div>
    <h1>الإنجيل المقدس</h1>
    
    <div class="search-container">
        <input type="text" placeholder="ابحث في الكتاب المقدس (العهد القديم والجديد)...">
        <button>بحث</button>
    </div>

    <div class="welcome-msg">
        مرحباً بكم في مكتبة حبيب قدوس
    </div>

</body>
</html>
