<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة حبيب قدوس</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Aref+Ruqaa:wght@700&display=swap');

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #000; font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow-x: hidden;
        }

        /* الخلفية: صورة السيد المسيح ثابتة */
        .background-image {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e4/Christ_the_Consoler.jpg');
            background-size: cover; background-position: center;
            z-index: -2;
        }

        .dark-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        /* الصليب العلامة المائية */
        .cross-bg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 65vh;
            color: rgba(255, 255, 255, 0.07);
            z-index: 0; pointer-events: none; user-select: none;
        }

        .wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 15px; min-height: 100vh; box-sizing: border-box;
        }

        .main-head {
            font-family: 'Aref Ruqaa', serif;
            color: #ffcc00; font-size: clamp(35px, 8vw, 70px);
            text-shadow: 3px 3px 10px #000; margin-bottom: 25px;
        }

        #searchInput {
            width: 100%; max-width: 500px;
            padding: 15px 25px; border: 3px solid #ffcc00;
            border-radius: 50px; font-size: 18px;
            background: rgba(255, 255, 255, 0.95);
            text-align: center; outline: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        #info-box {
            color: #fff; margin: 20px 0; font-size: 18px;
            text-shadow: 1px 1px 4px #000;
        }

        .results-area {
            width: 100%; max-width: 600px;
            list-style: none; padding: 0;
        }

        .file-item {
            background: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px; padding: 15px;
            border-radius: 12px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .file-item b { color: #222; font-size: 17px; }

        .file-item a {
            text-decoration: none; background: #8b0000;
            color: #fff; padding: 7px 15px;
            border-radius: 8px; font-weight: bold;
        }

        .footer-logo {
            margin-top: auto; padding-top: 50px;
            font-family: 'Amiri', serif; color: #fff;
            font-size: clamp(28px, 5vw, 45px);
            text-shadow: 2px 2px 8px #000;
        }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div class="dark-overlay"></div>
    <div class="cross-bg">†</div>

    <div class="wrapper">
        <h1 class="main-head">الكتاب المقدس كامل</h1>

        <input type="text" id="searchInput" placeholder="✍️ ابحث هنا (مثلاً: تكوين، مزمور...)" oninput="doSearch()">

        <div id="info-box">جاري فحص المكتبة...</div>

        <ul id="results-area" class="results-area"></ul>

        <div class="footer-logo">مكتبة حبيب قدوس</div>
    </div>

    <script>
        const USERNAME = 'youssefgood13-crypto';
        const REPOSITORY = 'servar-habib';
        let filesData = [];

        // دالة جلب الملفات بمجرد فتح الموقع
        async function loadFiles() {
            const info = document.getElementById('info-box');
            try {
                const res = await fetch(`https://api.github.com/repos/${USERNAME}/${REPOSITORY}/contents/`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                // تصفية الملفات: نأخذ الملفات فقط ونستبعد صفحة index.html
                filesData = data.filter(item => item.type === 'file' && item.name !== 'index.html');
                info.innerText = `✅ تم تحميل ${filesData.length} ملف بنجاح`;
            } catch (e) {
                info.innerText = "⚠️ تأكد أن المستودع 'Public' وأن الإنترنت يعمل";
                info.style.color = "#ff6666";
            }
        }

        // دالة البحث
        async function doSearch() {
            const txt = document.getElementById('searchInput').value.trim().toLowerCase();
            const list = document.getElementById('results-area');
            const info = document.getElementById('info-box');
            
            list.innerHTML = '';
            if (txt.length < 2) {
                info.innerText = `✅ المكتبة جاهزة (${filesData.length} ملف)`;
                return;
            }

            info.innerText = "🔍 جاري البحث...";

            let found = 0;
            for (let f of filesData) {
                if (f.name.toLowerCase().includes(txt)) {
                    found++;
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerHTML = `<b>📖 ${f.name}</b><a href="${f.html_url}" target="_blank">فتح</a>`;
                    list.appendChild(li);
                }
            }

            info.innerText = found > 0 ? `✨ وجدنا ${found} نتيجة` : "🤷 لم نجد نتائج لـ " + txt;
        }

        window.onload = loadFiles;
    </script>
</body>
</html>
