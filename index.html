<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة حبيب قدوس</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 50 px;
        }
        .header-icon {
            font-size: 50 px;
            color: #8b0000;
        }
        h1 {
            color: #333;
        }
        .search-container {
            margin-top: 30 px;
        }
        input[type="text"] {
            padding: 10 px;
            width: 60 %;
            border: 1 px solid #ccc;
            border-radius: 5 px;
        }
        button {
            padding: 10 px 20 px;
            background-color: #8b0000;
            color: white;
            border: none;
            border-radius: 5 px;
            cursor: pointer;
        }
        .welcome-msg {
            margin-top: 20 px;
            font-size: 20 px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="header-icon">†</div>
    <h1>الإنجيل المقدس</h1>
    
    <div class="search-container">
        <input type="text" placeholder="ابحث في الكتاب المقدس (العهد القديم والجديد)...">
        <button>بحث</button>
    </div>

    <div class="welcome-msg">
        مرحباً بكم في مكتبة حبيب قدوس
    </div>
<script>
  async function searchBible() {
    const query = document.getElementById('searchInput').value;
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = 'جاري البحث...';

    // هنا بنحدد ملفات الـ JSON (تأكد من مطابقة الأسماء)
    const files = ['Mark.json', 'Exodus.json']; 
    let results = [];

    for (const file of files) {
      try {
        const response = await fetch(`data/${file}`);
        const data = await response.json();
        
        // البحث جوه النصوص
        data.verses.forEach(verse => {
          if (verse.text.includes(query)) {
            results.push(`<b>${data.book} ${verse.chapter}:${verse.verse}</b> - ${verse.text}`);
          }
        });
      } catch (e) {
        console.error("خطأ في تحميل الملف: " + file);
      }
    }

    resultsDiv.innerHTML = results.length > 0 ? results.join('<br><br>') : 'لم يتم العثور على نتائج.';
  }
</script>
</body>
</html>
