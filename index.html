<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة حبيب قدوس</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        .header { color: #8b0000; margin-bottom: 20px; }
        .cross { font-size: 40px; color: #8b0000; margin-bottom: 10px; }
        #searchBox { padding: 10px; width: 60%; border: 1px solid #ccc; border-radius: 5px; }
        #results { margin-top: 20px; text-align: right; display: inline-block; width: 80%; }
        .file-link { display: block; padding: 10px; background: white; margin-bottom: 5px; text-decoration: none; color: #333; border-radius: 5px; border-right: 5px solid #8b0000; }
    </style>
</head>
<body>

    <div class="cross">†</div>
    <h1 class="header">الكتاب المقدس</h1>
    <h2 class="header">مكتبة حبيب قدوس</h2>

    <input type="text" id="searchBox" placeholder="اكتب اسم الإصحاح أو الكلمة هنا..." oninput="performSearch()">
    
    <div id="results"></div>

    <script>
        // هنا الكود بيجيب الملفات أوتوماتيك من حسابك
        async function performSearch() {
            const query = document.getElementById('searchBox').value.trim();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (query === '') return;

            try {
                // هنسحب قائمة الملفات من GitHub API
                const response = await fetch('https://api.github.com/repos/habib-quddous/habib-quddous.github.io/contents/');
                const files = await response.json();

                const filteredFiles = files.filter(file => 
                    file.name.includes(query) && file.name !== 'index.html'
                );

                if (filteredFiles.length === 0) {
                    resultsDiv.innerHTML = '<p>لم يتم العثور على نتائج.</p>';
                    return;
                }

                filteredFiles.forEach(file => {
                    const link = document.createElement('a');
                    link.href = file.path;
                    link.className = 'file-link';
                    link.innerText = file.name.replace('.html', '');
                    resultsDiv.appendChild(link);
                });
            } catch (error) {
                console.error('حدث خطأ في البحث:', error);
            }
        }
    </script>
</body>
</html>
