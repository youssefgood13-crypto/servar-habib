<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة حبيب قدوس</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Aref+Ruqaa:wght@700&display=swap');
        
        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #000; font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white; overflow-x: hidden;
        }

        /* الخلفية الثابتة */
        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e4/Christ_the_Consoler.jpg');
            background-size: cover; background-position: center; z-index: -2;
        }

        .layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: -1;
        }

        /* الصليب العلامة المائية */
        .cross-mark {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60vh; color: rgba(255, 255, 255, 0.05);
            z-index: 0; pointer-events: none;
        }

        .main {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            padding: 50px 20px; text-align: center;
        }

        h1 {
            font-family: 'Aref Ruqaa', serif; color: #ffcc00;
            font-size: clamp(35px, 8vw, 60px); margin-bottom: 20px;
            text-shadow: 2px 2px 10px #000;
        }

        #searchBox {
            width: 100%; max-width: 500px; padding: 15px;
            border: 3px solid #ffcc00; border-radius: 50px;
            font-size: 18px; outline: none; text-align: center;
            background: white; color: black; font-weight: bold;
        }

        #msg { margin: 20px; font-size: 18px; color: #ffcc00; }

        .res-list { width: 100%; max-width: 600px; padding: 0; list-style: none; }

        .card {
            background: rgba(255, 255, 255, 0.95); color: #000;
            margin: 10px 0; padding: 15px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .card a {
            background: #8b0000; color: #fff; padding: 8px 15px;
            text-decoration: none; border-radius: 8px; font-weight: bold;
        }

        .footer {
            margin-top: 50px; font-family: 'Amiri', serif;
            font-size: clamp(25px, 5vw, 40px); text-shadow: 2px 2px 8px #000;
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="layer"></div>
    <div class="cross-mark">†</div>

    <div class="main">
        <h1>الكتاب المقدس كامل</h1>
        <input type="text" id="searchBox" placeholder="اكتب اسم السفر للبحث..." oninput="filtering()">
        <div id="msg">جاري تحميل المكتبة...</div>
        <ul id="res-list" class="res-list"></ul>
        <div class="footer">مكتبة حبيب قدوس</div>
    </div>

    <script>
        // بياناتك الصحيحة
        const myUser = 'youssefgood13-crypto';
        const myRepo = 'servar-habib';
        let myFiles = [];

        async function start() {
            const msg = document.getElementById('msg');
            try {
                // جلب القائمة من GitHub API
                const response = await fetch(`https://api.github.com/repos/${myUser}/${myRepo}/contents/`);
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    // استبعاد ملف الاندكس واي ملفات مش HTML
                    myFiles = data.filter(f => f.type === 'file' && f.name !== 'index.html');
                    msg.innerText = `✅ تم العثور على ${myFiles.length} ملف جاهز للقراءة`;
                } else {
                    msg.innerText = "❌ لم يتم العثور على ملفات في المستودع";
                }
            } catch (e) {
                msg.innerText = "❌ مشكلة في الاتصال بـ GitHub";
            }
        }

        function filtering() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            const list = document.getElementById('res-list');
            list.innerHTML = '';

            if (query.length < 1) return;

            const results = myFiles.filter(f => f.name.toLowerCase().includes(query));
            
            results.forEach(f => {
                const li = document.createElement('li');
                li.className = 'card';
                // الرابط المباشر لفتح الملف
                const link = `https://${myUser}.github.io/${myRepo}/${f.name}`;
                li.innerHTML = `<b>📖 ${f.name.replace('.html', '')}</b> <a href="${link}" target="_blank">فتح السفر</a>`;
                list.appendChild(li);
            });

            document.getElementById('msg').innerText = results.length > 0 ? `لقينا ${results.length} نتيجة` : "لم نجد ملف بهذا الاسم";
        }

        start();
    </script>
</body>
</html>
