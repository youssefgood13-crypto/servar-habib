<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة حبيب قدوس - الكتاب المقدس</title>
    <style>
        /* جلب خط عربي مزخرف من جوجل */
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Aref+Ruqaa:wght@700&display=swap');

        :root {
            --primary-gold: #e6b800; /* لون ذهبي واضح */
            --light-text: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            direction: rtl;
        }

        /* الخلفية: صورة السيد المسيح كاملة وثابتة */
        .main-container {
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e4/Christ_the_Consoler.jpg'); /* صورة وقورة وكبيرة للمسيح */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* يجعل الخلفية ثابتة عند التمرير */
            min-height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* طبقة تظليل فوق الصورة لتحسين وضوح الكتابة */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* تظليل أسود خفيف */
            z-index: 1;
        }

        /* المحتوى الأساسي */
        .content {
            position: relative;
            z-index: 3; /* فوق التظليل والعلامة المائية */
            width: 90%;
            max-width: 800px;
            text-align: center;
            margin-top: 50px; /* مسافة من الأعلى */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الصليب كعلامة مائية كبيرة جداً في المنتصف */
        .watermark-cross {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80vh; /* حجم عملاق بالنسبة لطول الشاشة */
            color: rgba(255, 255, 255, 0.1); /* أبيض شفاف جداً */
            font-weight: bold;
            z-index: 2; /* بين التظليل والمحتوى */
            pointer-events: none; /* لا يعيق الضغط */
            user-select: none;
        }

        /* عنوان "الكتاب المقدس كامل" مزخرف */
        h1.main-title {
            font-family: 'Aref Ruqaa', serif; /* خط عربي مزخرف فخم */
            color: var(--primary-gold);
            font-size: 60px;
            margin: 0 0 20px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8); /* ظل قوي للوضوح */
        }

        /* مربع البحث المتفاعل */
        .search-box {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 20px auto 40px auto;
        }
        #searchInput {
            width: 100%;
            padding: 18px 25px;
            border: 3px solid var(--primary-gold);
            border-radius: 35px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.9); /* أبيض نصف شفاف */
            outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
            text-align: center;
        }
        #searchInput:focus {
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 8px 20px rgba(230, 184, 0, 0.5);
        }

        /* قائمة النتائج */
        #results {
            list-style: none;
            padding: 0;
            width: 100%;
            margin-bottom: 100px; /* مسافة قبل الفوتر */
        }
        .file-item {
            background: rgba(255, 255, 255, 0.9);
            margin-bottom: 12px;
            padding: 18px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .file-item:hover { transform: translateY(-3px); }
        .file-item a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 18px;
        }
        .loading-status {
            color: var(--light-text);
            font-size: 18px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        /* مكتبة حبيب قدوس أسفل الشاشة (في الجيم) */
        .footer-title {
            position: relative; /* لضمان ظهوره بعد المحتوى */
            z-index: 3;
            width: 100%;
            text-align: center;
            padding: 30px 0;
            margin-top: auto; /* يدفعه للأسفل */
        }
        .footer-title h2 {
            font-family: 'Amiri', serif; /* خط عربي كلاسيكي وقور */
            color: var(--light-text);
            font-size: 36px;
            margin: 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="overlay"></div>

        <div class="watermark-cross">†</div>

        <div class="content">
            <h1 class="main-title">الكتاب المقدس كامل</h1>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="✍️ ابحث عن آية، إصحاح، أو ملف..." oninput="searchFiles()">
            </div>

            <div id="status" class="loading-status">جاري تجهيز الملفات...</div>
            <ul id="results"></ul>
        </div>

        <div class="footer-title">
            <h2>مكتبة حبيب قدوس</h2>
        </div>
    </div>

    <script>
        // ربط مباشر ببيانات المستودع الخاص بك لضمان عمل البحث
        const username = 'youssefgood13-crypto';
        const repo = 'servar-habib'; 
        let allFiles = [];

        async function init() {
            const statusElem = document.getElementById('status');
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                // جلب جميع الملفات ماعدا index.html وصور الخلفية لو وُجدت
                allFiles = data.filter(f => f.type === 'file' && f.name !== 'index.html');
                statusElem.innerText = `📄 تم تجهيز ${allFiles.length} ملف للبحث في المكتبة`;
            } catch (e) {
                statusElem.innerText = "⚠️ خطأ في الاتصال بالمكتبة. تأكد من إعدادات المستودع.";
                statusElem.style.color = '#ff6b6b';
            }
        }

        async function searchFiles() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';

            // البحث يبدأ بعد كتابة حرفين
            if (query.length < 2) return;

            // إظهار رسالة جاري البحث
            const statusElem = document.getElementById('status');
            statusElem.innerText = "🔍 جاري البحث في المحتوى...";

            let foundCount = 0;

            for (const file of allFiles) {
                let match = false;
                
                // 1. البحث في اسم الملف أولاً لسرعة النتائج
                if (file.name.toLowerCase().includes(query)) {
                    match = true;
                } else {
                    // 2. البحث داخل المحتوى (للملفات النصية)
                    try {
                        const res = await fetch(file.download_url);
                        if(res.ok) {
                            const text = await res.text();
                            if (text.toLowerCase().includes(query)) match = true;
                        }
                    } catch (err) { /* تجاهل أخطاء ملفات معينة */ }
                }

                if (match) {
                    foundCount++;
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerHTML = `
                        <span>📕 ${file.name}</span>
                        <a href="${file.html_url}" target="_blank">قراءة الأن</a>
                    `;
                    resultsContainer.appendChild(li);
                }
            }

            // تحديث الحالة بعد انتهاء البحث
            if (foundCount > 0) {
                statusElem.innerText = `✅ وجدنا ${foundCount} نتيجة بحث لـ "${query}"`;
            } else {
                statusElem.innerText = `❌ لم نجد نتائج لـ "${query}" في محتوى المكتبة.`;
            }
        }

        init();
    </script>
</body>
</html>
