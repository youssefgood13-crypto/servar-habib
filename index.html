<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة حبيب قدوس</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Aref+Ruqaa:wght@700&display=swap');

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #000; font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow-x: hidden;
        }

        /* صورة الخلفية للسيد المسيح ثابتة وواضحة */
        .background-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e4/Christ_the_Consoler.jpg');
            background-size: cover; background-position: center;
            z-index: -2;
        }

        /* طبقة تظليل لضمان وضوح النصوص */
        .dark-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        /* الصليب العلامة المائية كبير جداً */
        .cross-watermark {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 70vh;
            color: rgba(255, 255, 255, 0.08);
            z-index: 0; pointer-events: none; user-select: none;
        }

        .container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            padding: 50px 15px; min-height: 100vh; box-sizing: border-box;
        }

        /* كلمة الكتاب المقدس مزخرفة بالذهبي */
        .main-title {
            font-family: 'Aref Ruqaa', serif;
            color: #ffcc00; font-size: clamp(40px, 9vw, 75px);
            text-shadow: 3px 3px 12px #000; margin-bottom: 30px;
        }

        /* مربع البحث */
        #searchInput {
            width: 100%; max-width: 550px;
            padding: 18px 30px; border: 3px solid #ffcc00;
            border-radius: 50px; font-size: 20px;
            background: rgba(255, 255, 255, 0.95);
            text-align: center; outline: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        #status-info {
            color: #fff; margin: 25px 0; font-size: 19px;
            text-shadow: 1px 1px 5px #000;
        }

        .results-list {
            width: 100%; max-width: 650px;
            list-style: none; padding: 0;
        }

        .file-box {
            background: rgba(255, 255, 255, 0.92);
            margin-bottom: 12px; padding: 18px;
            border-radius: 15px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .file-box b { color: #1a1a1a; font-size: 18px; }

        .file-box a {
            text-decoration: none; background: #8b0000;
            color: #fff; padding: 8px 18px;
            border-radius: 10px; font-weight: bold;
        }

        /* كلمة مكتبة حبيب قدوس في الأسفل */
        .footer-brand {
            margin-top: auto; padding-top: 60px;
            font-family: 'Amiri', serif; color: #fff;
            font-size: clamp(30px, 6vw, 50px);
            text-shadow: 2px 2px 10px #000;
        }
    </style>
</head>
<body>

    <div class="background-fixed"></div>
    <div class="dark-layer"></div>
    <div class="cross-watermark">†</div>

    <div class="container">
        <h1 class="main-title">الكتاب المقدس كامل</h1>

        <input type="text" id="searchInput" placeholder="✍️ ابحث عن سفر أو آية..." oninput="handleSearch()">

        <div id="status-info">جاري تجهيز المكتبة...</div>

        <ul id="results-list" class="results-list"></ul>

        <div class="footer-brand">مكتبة حبيب قدوس</div>
    </div>

    <script>
        // الربط المباشر مع مستودعك الخاص
        const GITHUB_USER = 'youssefgood13-crypto';
        const GITHUB_REPO = 'servar-habib';
        let allLibraryFiles = [];

        async function initLibrary() {
            const status = document.getElementById('status-info');
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                // تصفية الملفات واستبعاد index.html
                allLibraryFiles = data.filter(file => file.type === 'file' && file.name !== 'index.html');
                status.innerText = `✅ تم تجهيز ${allLibraryFiles.length} ملف للبحث`;
            } catch (e) {
                status.innerText = "⚠️ تأكد أن المستودع 'Public' في إعدادات GitHub";
                status.style.color = "#ff4d4d";
            }
        }

        async function handleSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const list = document.getElementById('results-list');
            const status = document.getElementById('status-info');
            
            list.innerHTML = '';
            if (query.length < 2) {
                status.innerText = `✅ المكتبة جاهزة (${allLibraryFiles.length} ملف)`;
                return;
            }

            status.innerText = "🔍 جاري البحث في الأسماء والمحتوى...";

            let count = 0;
            for (let file of allLibraryFiles) {
                let match = false;
                
                // البحث في اسم الملف
                if (file.name.toLowerCase().includes(query)) {
                    match = true;
                } else {
                    // البحث في محتوى الملف
                    try {
                        const res = await fetch(file.download_url);
                        const content = await res.text();
                        if (content.toLowerCase().includes(query)) match = true;
                    } catch (err) {}
                }

                if (match) {
                    count++;
                    const li = document.createElement('li');
                    li.className = 'file-box';
                    li.innerHTML = `<b>📕 ${file.name}</b><a href="${file.html_url}" target="_blank">قراءة</a>`;
                    list.appendChild(li);
                }
            }
            status.innerText = count > 0 ? `✨ وجدنا ${count} نتيجة بحث` : "🤷 لم نجد نتائج لـ " + query;
        }

        window.onload = initLibrary;
    </script>
</body>
</html>
